data:
  raw_path: data/raw/train.csv
  processed_train_path: data/processed/titanic-train.parquet
  processed_test_path: data/processed/titanic-test.parquet
  test_size: 0.2
  random_state: 42

model:
  model_name: titanic
  output_dir: models/titanic

models:
  random_forest:
    n_estimators: 200
    max_depth: 8
    min_samples_split: 4
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1
  adaboost:
    n_estimators: 100
    learning_rate: 0.1
    random_state: 42
